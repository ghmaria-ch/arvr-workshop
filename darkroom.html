<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dark Bedroom Simulation</title>

<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

<style>
body{margin:0;}
</style>

</head>

<body>

<a-scene>

<!-- SKY -->
<a-sky color="black"></a-sky>

<!-- CAMERA -->
<a-entity position="0 1.6 3">

<a-camera wasd-controls look-controls>

<!-- FLASHLIGHT -->
<a-light 
type="spot"
color="white"
intensity="3"
distance="15"
angle="30">
</a-light>

<!-- MESSAGE DISPLAY -->
<a-text 
id="messageText"
value="Take a deep breath..."
position="0 -0.6 -1"
align="center"
width="2"
color="white">
</a-text>

</a-camera>

</a-entity>


<!-- FLOOR -->
<a-plane 
rotation="-90 0 0"
width="12"
height="12"
color="#111">
</a-plane>


<!-- WALLS -->

<a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#222"></a-box>
<a-box position="0 2 5" width="10" height="4" depth="0.2" color="#222"></a-box>
<a-box position="5 2 0" width="0.2" height="4" depth="10" color="#222"></a-box>
<a-box position="-5 2 0" width="0.2" height="4" depth="10" color="#222"></a-box>


<!-- BED FRAME -->
<a-box position="0 0.3 -2" width="2" height="0.4" depth="4" color="#3b2f2f"></a-box>

<!-- MATTRESS -->
<a-box position="0 0.6 -2" width="2" height="0.3" depth="4" color="#dcdcdc"></a-box>

<!-- PILLOW -->
<a-box position="0 0.9 -3.5" width="1" height="0.2" depth="0.6" color="white"></a-box>


<!-- NIGHT TABLE -->
<a-box 
position="1.8 0.5 -2.5"
width="0.7"
height="1"
depth="0.7"
color="#5a3a22">
</a-box>


<!-- CUPBOARD / WARDROBE -->
<a-box 
position="-3 1.5 -3"
width="1.8"
height="3"
depth="1"
color="#4a2f1a">
</a-box>

<!-- CUPBOARD DOORS -->
<a-box position="-3.4 1.5 -2.49" width="0.8" height="2.8" depth="0.02" color="#5c3b22"></a-box>
<a-box position="-2.6 1.5 -2.49" width="0.8" height="2.8" depth="0.02" color="#5c3b22"></a-box>


<!-- WALL FRAME -->
<a-box 
position="2 2 -4.9"
width="1"
height="0.7"
depth="0.05"
color="#333">
</a-box>


<!-- DIM LIGHT -->
<a-light 
type="point"
color="#555"
intensity="0.3"
position="0 3 0">
</a-light>


</a-scene>


<script>

const messages = [

"Take a deep breath. You are safe here.",
"Relax your body and stay calm.",
"It's okay to feel nervous.",
"Focus on your breathing.",
"You are in control of this experience.",
"Every step you take builds confidence.",
"You are doing great.",
"Stay calm and keep exploring."

];

let index = 0;

setInterval(() => {

document.querySelector("#messageText")
.setAttribute("value", messages[index]);

index = (index + 1) % messages.length;

}, 5000);

</script>

</body>
</html>
