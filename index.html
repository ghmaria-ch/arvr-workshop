<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VR Fear Simulation System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- AFRAME LIBRARY -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <style>
    body { margin:0; }
  </style>
</head>

<body>

<a-scene>

  <!-- SKY / BACKGROUND -->
  <a-sky color="#1e1e2f"></a-sky>

  <!-- CAMERA -->
  <a-entity position="0 1.6 0">
      <a-camera>
          <a-cursor color="yellow"></a-cursor>
      </a-camera>
  </a-entity>

  <!-- TITLE -->
  <a-text 
      value="VR Fear Simulation"
      position="-1 3 -4"
      color="white"
      scale="2 2 2">
  </a-text>

  <!-- MENU OPTIONS -->

  <!-- Stage Fear -->
  <a-box 
      position="-3 1 -5"
      color="red"
      depth="1"
      height="1"
      width="1">
  </a-box>

  <a-text
      value="Stage Fear"
      position="-3 2 -5"
      align="center">
  </a-text>


  <!-- Dark Room -->
  <a-box 
    position="-1 1 -5"
    color="black"
    class="clickable"
    id="darkRoomBox">
</a-box>

<a-text
    value="Dark Room"
    position="-1 2 -5"
    align="center">
</a-text>


  <!-- Height Fear -->
  <a-box 
      position="1 1 -5"
      color="blue"
      class="clickable"
      id="heightBox">
  </a-box>

  <a-text
      value="Heights"
      position="1 2 -5"
      align="center">
  </a-text>


  <!-- Insects Fear -->
  <a-box 
      position="3 1 -5"
      color="green">
  </a-box>

  <a-text
      value="Insects"
      position="3 2 -5"
      align="center">
  </a-text>


  <!-- GROUND -->
  <a-plane 
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#7BC8A4">
  </a-plane>


  <!-- ============================= -->
  <!-- SIMULATION AREAS (ADD LATER) -->
  <!-- ============================= -->

  <!-- Stage Simulation Area -->
  <!-- Add podium, audience here -->


  <!-- Dark Room Simulation -->
  <!-- Add walls, flashlight -->


  <!-- Height Simulation -->
  <!-- Add tall building platform -->


  <!-- Insect Simulation -->
  <!-- Add spiders / insects -->


</a-scene>
<script>
document.querySelector("#darkRoomBox").addEventListener("click", function () {
    window.location.href = "darkroom.html";
});
</script>
<script>
document.querySelector("#heightBox").addEventListener("click", function () {
    window.location.href = "highrise.html";
});
</script>
</body>
</html>
